<!DOCTYPE html>
<html>
<head>
  <title>Happy Anniversary 🤍</title>
  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #ffd6e8, #ffeef5);
      text-align:center;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      flex-direction:column;
      animation: fadeIn 2s;
    }
    h1 {
      font-size:40px;
      color:#d63384;
    }
    p {
      font-size:18px;
      color:#444;
    }
    button {
      padding:12px 25px;
      border:none;
      border-radius:25px;
      background:#ff69b4;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:20px;
    }
    button:hover {
      background:#ff1493;
    }
    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }
  </style>
</head>
<body>

<p>Untuk kamu yang selalu jadi rumah.</p>

<a href="foto.html">

</html>
